<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Ideart</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .user-info-box {
            padding: 10px 14px;
            background: var(--light-blue);
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: var(--dark-blue);
        }
        .user-info-box strong { color: var(--dark-blue); }
        .password-hint {
            margin-top: 6px;
            font-size: 0.8rem;
            color: var(--text-color);
            opacity: 0.75;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--primary-blue);
            cursor: pointer;
            font-size: 1rem;
            padding: 6px;
            z-index: 2;
        }
        .toggle-password i {
            position: static;
            left: auto;
            pointer-events: none;
            font-size: 1rem;
            color: var(--primary-blue);
        }
        .input-wrapper { position: relative; }
        .input-wrapper input[type="password"],
        .input-wrapper input[type="text"] {
            padding-right: 44px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-wrapper">
            <div class="logo-section">
                <div class="logo-placeholder">
                    <i class="fas fa-lock-open"></i>
                </div>
                <h1>Redefinir Senha</h1>
                <p>Escolha uma nova senha para sua conta</p>
            </div>

            <div id="tokenInvalidBox" class="error-alert" style="display: none;">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="tokenInvalidMessage">Validando token...</span>
            </div>

            <div id="userInfoBox" class="user-info-box" style="display: none;">
                Redefinindo senha para <strong id="userEmail"></strong>
            </div>

            <form class="login-form" id="resetForm" style="display: none;">
                <div class="form-group">
                    <label for="novaSenha">Nova Senha</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input
                            type="password"
                            id="novaSenha"
                            name="novaSenha"
                            placeholder="Digite a nova senha"
                            required
                            autocomplete="new-password"
                            minlength="6"
                        >
                        <button type="button" class="toggle-password" data-target="novaSenha" aria-label="Mostrar senha">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="novaSenhaError"></span>
                    <div class="password-hint">Mínimo de 6 caracteres.</div>
                </div>

                <div class="form-group">
                    <label for="confirmarSenha">Confirmar Nova Senha</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input
                            type="password"
                            id="confirmarSenha"
                            name="confirmarSenha"
                            placeholder="Confirme a nova senha"
                            required
                            autocomplete="new-password"
                            minlength="6"
                        >
                        <button type="button" class="toggle-password" data-target="confirmarSenha" aria-label="Mostrar senha">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="confirmarSenhaError"></span>
                </div>

                <div class="error-alert" id="errorAlert" style="display: none;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorMessage"></span>
                </div>

                <div class="success-alert" id="successAlert" style="display: none;">
                    <i class="fas fa-check-circle"></i>
                    <span id="successMessage"></span>
                </div>

                <button type="submit" class="btn-login" id="submitBtn">
                    <i class="fas fa-save"></i>
                    <span>Redefinir senha</span>
                </button>
            </form>

            <div class="login-footer">
                <p class="forgot-password">
                    <a href="/login.html">
                        <i class="fas fa-arrow-left"></i>
                        Voltar para o login
                    </a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/reset-password.js"></script>
</body>
</html>
