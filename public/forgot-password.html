<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Ideart</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .reset-link-box {
            margin-top: 15px;
            padding: 12px;
            background: var(--light-blue);
            border: 1px dashed var(--primary-blue);
            border-radius: 8px;
            font-size: 0.85rem;
            word-break: break-all;
        }
        .reset-link-box strong { color: var(--dark-blue); display: block; margin-bottom: 6px; }
        .reset-link-box a { color: var(--primary-blue); text-decoration: none; }
        .reset-link-box a:hover { text-decoration: underline; }
        .reset-link-box .hint { margin-top: 8px; color: var(--text-color); opacity: 0.75; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-wrapper">
            <div class="logo-section">
                <div class="logo-placeholder">
                    <i class="fas fa-key"></i>
                </div>
                <h1>Recuperar Senha</h1>
                <p>Informe seu usuário ou email para receber um link de redefinição</p>
            </div>

            <form class="login-form" id="forgotForm">
                <div class="form-group">
                    <label for="identificador">Usuário ou Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input
                            type="text"
                            id="identificador"
                            name="identificador"
                            placeholder="Digite seu usuário ou email"
                            required
                            autocomplete="username"
                        >
                    </div>
                    <span class="error-message" id="identificadorError"></span>
                </div>

                <div class="error-alert" id="errorAlert" style="display: none;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorMessage"></span>
                </div>

                <div class="success-alert" id="successAlert" style="display: none;">
                    <i class="fas fa-check-circle"></i>
                    <span id="successMessage"></span>
                </div>

                <div id="resetLinkBox" class="reset-link-box" style="display: none;">
                    <strong><i class="fas fa-link"></i> Link de redefinição</strong>
                    <a id="resetLink" href="#" target="_blank"></a>
                    <div class="hint">
                        Em produção este link seria enviado por email. Copie-o e acesse para
                        definir uma nova senha. Validade: 1 hora.
                    </div>
                </div>

                <button type="submit" class="btn-login" id="submitBtn">
                    <i class="fas fa-paper-plane"></i>
                    <span>Gerar link de redefinição</span>
                </button>
            </form>

            <div class="login-footer">
                <p class="forgot-password">
                    <a href="/login.html">
                        <i class="fas fa-arrow-left"></i>
                        Voltar para o login
                    </a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/forgot-password.js"></script>
</body>
</html>
